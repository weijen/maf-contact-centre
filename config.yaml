# Application metadata
app:
  name: "MSFT Agent Framework Contact Centre"
  description: "Multi-agent assistant with intelligent handoffs"
  version: "0.0.1"


# Server Configuration
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# Agent Definitions
# -----------------
# Each agent is an AI persona with specific instructions and tools.
# Agents handle different domains and can transfer conversations to each other.
#
# Required fields:
#   name: Unique identifier (lowercase, underscores only)
#   description: Used in handoff function descriptions - helps AI decide when to transfer
#   instructions: Inline system prompt defining agent behavior
#   instructions_file: Path to a file containing the system prompt (relative to config.yaml)
#   NOTE: Use exactly one of 'instructions' or 'instructions_file', not both.
#
# Optional fields:
#   voice: TTS voice (overrides voice.default)
#   plugins: List of plugin names from plugins section
#   mcp: List of MCP server names from mcp_servers section
agents:
   - name: "receptionist"
     description: "A friendly receptionist who greets callers and routes them to the appropriate department"
     instructions_file: "src/prompts/receptionist.md"
     plugins:
       - "receptionist_tools"

   - name: "billing"
     description: "A billing specialist who handles payment and account questions"
     voice: "en-GB-SoniaNeural"
     instructions_file: "src/prompts/billing.md"
     plugins:
       - "billing_tools"

   - name: "support"
     description: "A technical support specialist who helps with product issues"
     voice: "en-GB-AlfieNeural"
     instructions_file: "src/prompts/support.md"
     plugins:
       - "support_tools"

# Handoff Definitions
# -------------------
# Defines which agents can transfer to which other agents.
# The description helps the AI decide when to trigger a transfer.
#
# The system automatically injects transfer_to_X functions into each agent.
# For example, the handoff below creates a transfer_to_billing() function
# that the receptionist can call.
handoffs:
   - from: "receptionist"
     to: "billing"
     description: "Transfer to billing for payment and account questions"

   - from: "receptionist"
     to: "support"
     description: "Transfer to support for technical issues"

   - from: "billing"
     to: "receptionist"
     description: "Transfer to receptionist for general questions"

   - from: "billing"
     to: "support"
     description: "Transfer to support for technical issues"

   - from: "support"
     to: "receptionist"
     description: "Transfer to receptionist for general questions"

   - from: "support"
     to: "billing"
     description: "Transfer to billing for payment questions"

# Orchestration Settings
orchestration:
  # Silent handoffs: When true, agents transfer without saying "please hold" or similar.
  # The customer just hears the new agent's voice continuing the conversation.
  silent_handoffs: true

# Observability Configuration
# ----------------------------
# Configures OpenTelemetry tracing with Azure Monitor.
# Set connection_string to enable (use ${APPLICATIONINSIGHTS_CONNECTION_STRING}).
# No-op when connection_string is empty.
observability:
  connection_string: "${APPLICATIONINSIGHTS_CONNECTION_STRING}"
  service_name: "ai-contact-centre"
  enable_content_recording: true
  trace_websocket_frames: false
